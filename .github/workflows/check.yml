# OPTIONAL: runs `make check` on every push / pull request and shows a green/red
# status. Delete this file if you'd rather only check locally with `make check`.
name: check submission

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::jsonlite
            any::digest
      - name: Self-check
        run: Rscript scripts/check.R
